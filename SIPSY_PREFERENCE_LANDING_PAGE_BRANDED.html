<script>
const urlParams = new URLSearchParams(window.location.search);
const email = urlParams.get('email');

document.getElementById('preferencesForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  if (!email) {
    showError('Email not found. Please try again from the email link.');
    return;
  }

  const selectedInterests = Array.from(document.querySelectorAll('input[name="interests"]:checked'))
    .map(cb => cb.value);

  if (selectedInterests.length === 0) {
    showError('Please select at least one interest.');
    return;
  }

  document.getElementById('formContent').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  try {
    const response = await fetch('https://sipsy-recovery-api-production.up.railway.app/api/update-preferences', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        email: email,
        interests: selectedInterests
      })
    });

    if (!response.ok) {
      throw new Error('Failed to save preferences');
    }

    document.getElementById('formContent').style.display = 'none';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('successMessage').style.display = 'block';

  } catch (error) {
    console.error('Error:', error);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('formContent').style.display = 'block';
    showError('Something went wrong. Please try again.');
  }
});

function showError(message) {
  const errorEl = document.getElementById('errorMessage');
  errorEl.textContent = message;
  errorEl.style.display = 'block';
}

function copyCode() {
  const code = 'THANKYOU5';
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.querySelector('.copy-btn');
    const originalText = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => {
      btn.textContent = originalText;
    }, 2000);
  });
}

if (!email) {
  showError('Email not found. Please click the link in your email.');
}
</script>
